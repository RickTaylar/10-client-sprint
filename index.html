<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 10-Client Sprint — Land Your First 10 Clients in 30 Days</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #050814;
            color: #e0e6ed;
            line-height: 1.7;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .content-wrap {
            position: relative;
            z-index: 1;
        }
        
        /* Hero Section - Premium */
        .hero {
            text-align: center;
            padding: 120px 20px 100px 20px;
            background: linear-gradient(135deg, #0f1629 0%, #050814 100%);
            border-bottom: 3px solid #ff6b35;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
        }
        
        /* 3-Part Headline Structure */
        .pattern-interrupt {
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 50px;
            color: #fff;
            letter-spacing: -0.03em;
            text-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }
        
        .mechanism-reveal {
            font-size: 2.1rem;
            color: #ff6b35;
            font-weight: 700;
            margin-bottom: 45px;
            line-height: 1.4;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .outcome-shift {
            font-size: 1.6rem;
            color: #b8c5d6;
            margin-bottom: 50px;
            line-height: 1.5;
            font-weight: 500;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .proof-line {
            font-size: 1.3rem;
            color: #e0e6ed;
            font-weight: 600;
            margin-bottom: 60px;
            font-style: italic;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%);
            color: #fff;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 25px 60px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 15px 50px rgba(255, 107, 53, 0.5);
            border: 2px solid #ff6b35;
            position: relative;
            overflow: hidden;
        }
        
        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .cta-button:hover::before {
            left: 100%;
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 60px rgba(255, 107, 53, 0.6);
        }
        
        .guarantee {
            margin-top: 30px;
            font-size: 1rem;
            color: #b8c5d6;
        }
        
        .guarantee span {
            margin: 0 15px;
            display: inline-block;
        }
        
        /* Stats Bar - Enhanced */
        .stats-section {
            padding: 0;
            border: none;
            margin: -50px 0 0 0;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 0;
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1629 100%);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid #ff6b35;
        }
        
        .stat {
            text-align: center;
            padding: 50px 30px;
            border-right: 1px solid rgba(255, 107, 53, 0.2);
            position: relative;
        }
        
        .stat:last-child {
            border-right: none;
        }
        
        .stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6b35, transparent);
        }
        
        .stat-number {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ff6b35;
            display: block;
            line-height: 1;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }
        
        .stat-label {
            font-size: 1.05rem;
            color: #b8c5d6;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }
        
        /* Content Sections */
        .section {
            padding: 90px 0;
            border-bottom: 1px solid rgba(255, 107, 53, 0.1);
        }
        
        .section-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 35px auto;
            background: linear-gradient(135deg, #ff6b35 0%, #e85a24 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }
        
        h2 {
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 40px;
            color: #fff;
            text-align: center;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }
        
        h3 {
            font-size: 2rem;
            font-weight: 700;
            margin: 45px 0 20px 0;
            color: #ff6b35;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: #b8c5d6;
            line-height: 1.85;
        }
        
        strong {
            color: #fff;
            font-weight: 700;
        }
        
        ul {
            margin: 25px 0 25px 35px;
        }
        
        li {
            margin-bottom: 18px;
            font-size: 1.2rem;
            color: #b8c5d6;
        }
        
        /* Timeline Section */
        .timeline {
            margin: 50px 0;
            padding: 50px 40px;
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1629 100%);
            border-radius: 15px;
            border-left: 5px solid #ff6b35;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        
        .timeline h3 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #fff;
        }
        
        .timeline-item {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 107, 53, 0.2);
        }
        
        .timeline-item:last-child {
            border-bottom: none;
        }
        
        .timeline-day {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ff6b35;
            margin-bottom: 10px;
        }
        
        /* Step Cards - Premium */
        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }
        
        .step-card {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1629 100%);
            padding: 40px 30px;
            border-radius: 15px;
            border: 2px solid rgba(255, 107, 53, 0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .step-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6b35, #ff8c5a);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }
        
        .step-card:hover::before {
            transform: scaleX(1);
        }
        
        .step-card:hover {
            transform: translateY(-8px);
            border-color: #ff6b35;
            box-shadow: 0 15px 50px rgba(255, 107, 53, 0.3);
        }
        
        .step-number {
            font-size: 3rem;
            font-weight: 900;
            color: #ff6b35;
            margin-bottom: 20px;
            line-height: 1;
        }
        
        .step-card h3 {
            margin-top: 0;
            font-size: 1.6rem;
        }
        
        .step-card p {
            font-size: 1.1rem;
            margin-bottom: 0;
        }
        
        /* Future Visualization */
        .future-viz {
            background: linear-gradient(135deg, #0f1629 0%, #1a1f3a 100%);
            padding: 60px 50px;
            border-radius: 15px;
            margin: 50px 0;
            border: 2px solid #ff6b35;
            box-shadow: 0 15px 50px rgba(255, 107, 53, 0.3);
        }
        
        .future-viz h3 {
            color: #fff;
            margin-top: 0;
        }
        
        .future-viz p {
            font-size: 1.25rem;
            font-style: italic;
            line-height: 1.9;
            color: #e0e6ed;
        }
        
        /* Testimonials - Premium */
        .testimonial {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1629 100%);
            padding: 45px;
            border-radius: 15px;
            margin: 35px 0;
            border-left: 6px solid #ff6b35;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }
        
        .testimonial:hover {
            transform: translateX(5px);
        }
        
        .testimonial-text {
            font-size: 1.25rem;
            font-style: italic;
            margin-bottom: 20px;
            color: #e0e6ed;
            line-height: 1.8;
        }
        
        .testimonial-author {
            font-weight: 700;
            color: #ff6b35;
            font-size: 1.1rem;
        }
        
        .testimonial-stats {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 107, 53, 0.2);
            font-size: 0.95rem;
            color: #b8c5d6;
        }
        
        /* Modules Grid */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }
        
        .module {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1629 100%);
            padding: 40px 35px;
            border-radius: 15px;
            border: 2px solid rgba(255, 107, 53, 0.2);
            transition: all 0.3s ease;
        }
        
        .module:hover {
            border-color: #ff6b35;
            box-shadow: 0 15px 45px rgba(255, 107, 53, 0.25);
        }
        
        .module h3 {
            margin-top: 0;
            font-size: 1.7rem;
        }
        
        .module ul {
            margin-left: 25px;
        }
        
        .module li {
            font-size: 1.1rem;
        }
        
        /* Objections - Enhanced */
        .objection {
            margin: 40px 0;
            padding: 35px;
            background: linear-gradient(135deg, #0f1629 0%, #1a1f3a 100%);
            border-radius: 12px;
            border-left: 4px solid #ff6b35;
        }
        
        .objection h3 {
            font-size: 1.5rem;
            color: #fff;
            margin: 0 0 15px 0;
        }
        
        .objection p {
            margin-bottom: 0;
        }
        
        /* Differentiation Box */
        .diff-box {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1629 100%);
            padding: 50px;
            border-radius: 15px;
            margin: 50px 0;
            border: 3px solid #ff6b35;
            box-shadow: 0 20px 60px rgba(255, 107, 53, 0.4);
        }
        
        .diff-box h3 {
            color: #fff;
            font-size: 2.2rem;
            margin-top: 0;
            text-align: center;
        }
        
        .not-list {
            list-style: none;
            padding: 0;
            margin: 30px 0;
        }
        
        .not-list li {
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(255, 107, 53, 0.1);
            border-left: 4px solid #ff6b35;
            border-radius: 8px;
            font-size: 1.2rem;
        }
        
        /* Price Section - Ultra Premium */
        .price-section {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(135deg, #0f1629 0%, #050814 100%);
            position: relative;
        }
        
        .price-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255,107,53,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .price-box {
            max-width: 650px;
            margin: 0 auto;
            padding: 60px;
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1629 100%);
            border-radius: 20px;
            border: 4px solid #ff6b35;
            box-shadow: 0 25px 80px rgba(255, 107, 53, 0.5);
            position: relative;
        }
        
        .urgency-badge {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            color: #fff;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.5);
        }
        
        .price {
            font-size: 6rem;
            font-weight: 900;
            color: #ff6b35;
            margin: 30px 0 10px 0;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(255, 107, 53, 0.5);
        }
        
        .price-label {
            font-size: 1.4rem;
            color: #b8c5d6;
            margin-bottom: 40px;
        }
        
        .features-list {
            list-style: none;
            padding: 0;
            margin: 40px 0;
            text-align: left;
        }
        
        .features-list li {
            font-size: 1.3rem;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255, 107, 53, 0.2);
            color: #e0e6ed;
        }
        
        .features-list li:last-child {
            border-bottom: none;
        }
        
        .guarantee-box {
            background: rgba(255, 107, 53, 0.1);
            padding: 30px;
            border-radius: 12px;
            margin-top: 40px;
            border: 2px solid #ff6b35;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            color: #7a8a9e;
            font-size: 1rem;
            border-top: 1px solid rgba(255, 107, 53, 0.1);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .pattern-interrupt {
                font-size: 3.2rem;
            }
            
            .mechanism-reveal {
                font-size: 1.5rem;
            }
            
        .outcome-shift {
            font-size: 1.6rem;
            color: #b8c5d6;
            margin-bottom: 50px;
            line-height: 1.5;
            font-weight: 500;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .proof-line {
            font-size: 1.3rem;
            color: #e0e6ed;
            font-weight: 600;
            margin-bottom: 60px;
            font-style: italic;
        }
            
            h2 {
                font-size: 2.5rem;
            }
            
            .stats-bar {
                grid-template-columns: 1fr;
            }
            
            .stat {
                border-right: none;
                border-bottom: 1px solid rgba(255, 107, 53, 0.2);
            }
            
            .stat:last-child {
                border-bottom: none;
            }
            
            .price {
                font-size: 4rem;
            }
            
            .price-box,
            .diff-box,
            .timeline,
            .future-viz {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="content-wrap">
